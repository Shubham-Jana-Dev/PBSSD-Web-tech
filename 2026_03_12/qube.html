<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin:0px;
            padding:0px;
            display:flex;
            justify-content:center;
            align-items:center;
            
        }
        .container{
            margin-top:10%;
            height:300px;
            width:300px;
            background:2px solid black;
            background:red;
            align-items:center;
            display:flex;
            justify-content:center;
            perspective: 400px;
            perspective-origin:top,left;
        }
        .item1{
            height:30px;
            width:30px;
            background:2px solid black;
            background:rgb(236, 230, 230);
            transform:perspective(900px),rotateX(40deg);
            /* transform:perspective(400px),rotateY(45deg); */
            /* transform:perspective(900px),rotateZ(6deg); */
            position:relative;
        }
        .item2{
            height:30px;
            width:30px;
            background:2px solid black;
            background:rgb(85, 192, 39);
            transform:perspective(900px),rotateX(60deg);
            /* transform:perspective(400px),rotateY(65deg); */
            /* transform:perspective(900px),rotateZ(6deg); */
            position:relative;
        }
        .item3{
            height:30px;
            width:30px;
            background:2px solid black;
            background:rgb(192, 110, 39);
            transform:perspective(900px),rotateX(60deg);
            /* transform:perspective(400px),rotateY(65deg); */
            /* transform:perspective(900px),rotateZ(6deg); */
            position:relative;
        }
        .item4{
            height:30px;
            width:30px;
            background:2px solid black;
            background:rgb(47, 34, 98);
            transform:perspective(900px),rotateX(60deg);
            /* transform:perspective(400px),rotateY(65deg); */
            /* transform:perspective(900px),rotateZ(6deg); */
            position:relative;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item1"></div>
        <div class="item2"></div>
        <div class="item3"></div>
        <div class="item4"></div>

        
    </div>
</body>
</html>
